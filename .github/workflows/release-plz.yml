name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build binary for (e.g. v0.5.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-plz:
    name: Release-plz
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binary:
    name: Build and upload binary
    needs: release-plz
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-plz.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || needs.release-plz.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          # Download musl-cross toolchain with C++ support.
          # This provides x86_64-linux-musl-g++ linked against musl libc.
          curl -sSfL https://musl.cc/x86_64-linux-musl-cross.tgz | sudo tar xz -C /opt
          echo "/opt/x86_64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build static binary
        env:
          # Point cc-rs to the musl cross-compiler for C++ (CaDiCaL)
          CXX_x86_64_unknown_linux_musl: x86_64-linux-musl-g++
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Copy benchmarks.db from previous release
        run: |
          for tag in $(gh release list --limit 10 --json tagName --jq '.[].tagName'); do
            if [ "$tag" != "${{ env.RELEASE_TAG }}" ]; then
              if gh release download "$tag" --pattern 'benchmarks.db' --dir . --clobber 2>/dev/null; then
                echo "Copied benchmarks.db from $tag"
                break
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            target/x86_64-unknown-linux-musl/release/spinsat
            benchmarks.db
          fail_on_unmatched_files: false
