name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binary:
    name: Build and upload binary
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-plz.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain with C++ support
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Build static binary
        env:
          # CaDiCaL (via link-cplusplus/cc-rs) needs a C++ compiler for the musl target.
          # cc-rs looks for CXX_x86_64_unknown_linux_musl first. The system g++ works
          # because musl-tools provides the musl libc and Rust handles static linking.
          CXX_x86_64_unknown_linux_musl: g++
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Copy benchmarks.db from previous release
        run: |
          for tag in $(gh release list --limit 10 --json tagName --jq '.[].tagName'); do
            if [ "$tag" != "${{ needs.release-plz.outputs.tag }}" ]; then
              if gh release download "$tag" --pattern 'benchmarks.db' --dir . --clobber 2>/dev/null; then
                echo "Copied benchmarks.db from $tag"
                break
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-plz.outputs.tag }}
          files: |
            target/x86_64-unknown-linux-musl/release/spinsat
            benchmarks.db
          fail_on_unmatched_files: false
