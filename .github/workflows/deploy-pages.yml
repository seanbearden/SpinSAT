name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/dashboard/**'
  # Allow manual trigger to refresh DB from latest release
  workflow_dispatch:
  # Refresh when a new release is published (new benchmark data)
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download benchmarks.db from latest release
        run: |
          gh release download --pattern 'benchmarks.db' --dir docs/dashboard/ --clobber || echo "No benchmarks.db in releases yet — dashboard will show empty state"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
