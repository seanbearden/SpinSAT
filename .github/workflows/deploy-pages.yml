name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/dashboard/**'
  # Allow manual trigger to refresh DB from latest release
  workflow_dispatch:
  # Refresh when a new release is published (new benchmark data)
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download benchmarks.db from releases
        run: |
          # Try each release (newest first) until we find one with benchmarks.db
          for tag in $(gh release list --limit 10 --json tagName --jq '.[].tagName'); do
            if gh release download "$tag" --pattern 'benchmarks.db' --dir docs/dashboard/ --clobber 2>/dev/null; then
              echo "Downloaded benchmarks.db from release $tag"
              exit 0
            fi
          done
          echo "No benchmarks.db found in any release — dashboard will show empty state"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
