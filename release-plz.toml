[workspace]
changelog_update = true
git_release_enable = true
git_tag_enable = true

[[package]]
name = "spinsat"
# Only bump version when source code or Cargo.toml changes
release = true
# We're pre-1.0: adding struct fields and enum variants is expected in minor
# releases. Callers use ..Default::default() so new fields don't break them.
semver_check = false
